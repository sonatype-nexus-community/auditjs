name: Release

on:
  workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
  LC_APPLICATION_ID: auditjs
  NODE_VERSION: '22'

permissions:
    contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20']

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint auditjs
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Make test reports directory
        run: mkdir -p reports

      - name: Run tests
        run: npm run test-ci

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: reports/test-results.xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage/lcov.info

      - name: Dogfood scan
        run: npm run start -- guide --token ${{ secrets.SONATYPE_GUIDE_TOKEN }}

  sonatype:
    name: Sonatype Lifecycle
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # See https://help.sonatype.com/en/npm-application-analysis.html
      - name: Install Production Node Dependencies
        run: npm ci --omit=dev --ignore-scripts

      - name: Sonatype Lifecycle Evaluation
        id: evaluate
        uses: sonatype/actions/evaluate@v1
        with:
          iq-server-url: ${{ vars.SONATYPE_PLATFORM_URL }}
          username: ${{ secrets.SONATYPE_LIFECYCLE_USERNAME }}
          password: ${{ secrets.SONATYPE_LIFECYCLE_PASSWORD }}
          application-id: ${{ env.LC_APPLICATION_ID }}
          scan-targets: 'package-lock.json node_modules'
          stage: release

  release:
    needs:
      - build
      - sonatype
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      # registry-url causes setup-node to write //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}
      # to a temp .npmrc and export NPM_CONFIG_USERCONFIG pointing to it.  @semantic-release/npm
      # reads that file via set-npmrc-auth.js and copies the token reference to its own temp file,
      # so npm publish expands NODE_AUTH_TOKEN at the point it reads the userconfig.
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org/'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build auditjs
        run: npm run build

      - name: Install publishing packages
        run: npm install -g semantic-release@25 @semantic-release/changelog@6 @semantic-release/git@10 @semantic-release/npm@13

      - name: Attempt publish
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
