name: Build

on:
  pull_request:
    paths-ignore:
      - 'README.md'
  push:
    branches:
      - main

env:
  LC_APPLICATION_ID: auditjs
  NODE_VERSION: '20'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint auditjs
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Make test reports directory
        run: mkdir -p reports

      - name: Run tests
        run: npm run test-ci

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: reports/test-results.xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage/lcov.info

      - name: Dogfood scan
        run: npm run start -- guide --user ${{ secrets.OSSI_USERNAME }} --token ${{ secrets.SONATYPE_GUIDE_TOKEN }}

  sonatype:
    name: Sonatype Lifecycle
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # See https://help.sonatype.com/en/npm-application-analysis.html
      # --ignore-scripts prevents the prepare script (tsc build) from running without devDependencies
      - name: Install Production Node Dependencies
        run: npm ci --omit=dev --ignore-scripts

      - name: Sonatype Lifecycle Evaluation
        id: evaluate
        uses: sonatype/actions/evaluate@v1
        with:
          iq-server-url: ${{ vars.SONATYPE_PLATFORM_URL }}
          username: ${{ secrets.SONATYPE_LIFECYCLE_USERNAME }}
          password: ${{ secrets.SONATYPE_LIFECYCLE_PASSWORD }}
          application-id: ${{ env.LC_APPLICATION_ID }}
          scan-targets: 'package-lock.json node_modules'
